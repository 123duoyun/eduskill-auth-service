_format_version: "3.0"

services:
  - name: auth-frontend-pages
    url: http://auth-frontend:80
    routes:
      - name: auth-service-html
        hosts:
          - __KONG_APP_HOST__
        paths:
          - /
        strip_path: false
        preserve_host: true
  - name: educlaw-auth
    url: http://auth-backend:3000
    routes:
      - name: educlaw-auth-routes
        hosts:
          - __KONG_APP_HOST__
        paths:
          - /auth
          - /sms/send
          - /healthz
        strip_path: false
        preserve_host: true
        plugins:
          - name: oidc-jwt-auth
            config:
              require_token: false
              expected_issuer: "__ZITADEL_ISSUER__"
              expected_audience: "__ZITADEL_CLIENT_ID__"
  - name: inno-agent-api
    url: http://__INNO_AGENT_BACKEND_HOST__
    routes:
      - name: inno-agent-api-routes
        hosts:
          - __KONG_APP_HOST__
        paths:
          - /api
        strip_path: false
        preserve_host: true
        plugins:
          - name: oidc-jwt-auth
            config:
              require_token: true
              expected_issuer: "__ZITADEL_ISSUER__"
              expected_audience: "__ZITADEL_CLIENT_ID__"
