_format_version: "3.0"

services:
  - name: zitadel
    url: http://zitadel:8080
    routes:
      - name: zitadel-routes
        hosts:
          - __KONG_AUTH_HOST__
        paths:
          - /
        strip_path: false
        preserve_host: true

  - name: zitadel-login
    url: http://zitadel-login:3000
    routes:
      - name: zitadel-login-ui
        hosts:
          - __KONG_AUTH_HOST__
        paths:
          - /ui/v2/login
        strip_path: false
        preserve_host: true

  - name: auth-backend-api
    url: http://auth-backend:3000
    connect_timeout: 5000
    read_timeout: 3600000
    write_timeout: 3600000
    routes:
      - name: auth-service-api
        hosts:
          - __KONG_AUTH_HOST__
          - __KONG_APP_HOST__
        paths:
          - /auth
          - /sms/send
        strip_path: false
        preserve_host: true
        plugins:
          - name: oidc-jwt-auth
            config:
              require_token: false
              expected_issuer: "__ZITADEL_ISSUER__"
              expected_audience: "__ZITADEL_CLIENT_ID__"

  - name: educlaw-api
    url: http://educlaw-server:3000
    connect_timeout: 5000
    read_timeout: 3600000
    write_timeout: 3600000
    routes:
      - name: educlaw-protected
        hosts:
          - __KONG_APP_HOST__
        paths:
          - /agents
          - /profiles
          - /api
          - /llm
          - /events
        strip_path: false
        plugins:
          - name: oidc-jwt-auth
            config:
              require_token: true
              expected_issuer: "__ZITADEL_ISSUER__"
              expected_audience: "__ZITADEL_CLIENT_ID__"

  - name: educlaw-web
    url: http://educlaw-web:80
    routes:
      - name: educlaw-web-root
        hosts:
          - __KONG_APP_HOST__
        paths:
          - /
        strip_path: false
