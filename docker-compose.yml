services:
  kong:
    image: m.daocloud.io/docker.io/library/kong:3.6
    environment:
      # Kong 内部配置
      - KONG_DATABASE=off
      - KONG_PLUGINS=bundled,oidc-jwt-auth
      - KONG_DECLARATIVE_CONFIG=/tmp/kong.yml
      - KONG_PROXY_LISTEN=0.0.0.0:80, 0.0.0.0:8000
      # 业务域名（用于 kong.yml 模板替换）
      - KONG_APP_HOST=${KONG_APP_HOST:-eduskill.localhost}
      - KONG_AUTH_HOST=${KONG_AUTH_HOST:-auth.localhost}
      # Zitadel OIDC（用于 JWT 校验）
      - ZITADEL_ISSUER=${ZITADEL_ISSUER}
      - ZITADEL_CLIENT_ID=${ZITADEL_CLIENT_ID}
      # 沙箱后端地址（用于 kong.yml 模板替换）
      - INNO_AGENT_BACKEND_HOST=${INNO_AGENT_BACKEND_HOST:-inno-agent-backend:3000}
    command: >-
      sh -c 'awk
      "{gsub(/__KONG_APP_HOST__/,\"$$KONG_APP_HOST\");
      gsub(/__KONG_AUTH_HOST__/,\"$$KONG_AUTH_HOST\");
      gsub(/__ZITADEL_ISSUER__/,\"$$ZITADEL_ISSUER\");
      gsub(/__ZITADEL_CLIENT_ID__/,\"$$ZITADEL_CLIENT_ID\");
      gsub(/__INNO_AGENT_BACKEND_HOST__/,\"$$INNO_AGENT_BACKEND_HOST\"); print}"
      /etc/kong/kong.yml > /tmp/kong.yml
      && exec /docker-entrypoint.sh kong docker-start'
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
      - ./kong/plugins/oidc-jwt-auth:/usr/local/share/lua/5.1/kong/plugins/oidc-jwt-auth:ro
    ports:
      - "${KONG_PROXY_PORT:-80}:80"
      - "${KONG_ADMIN_PORT:-8001}:8001"  # Kong Admin API，仅用于调试，生产环境可移除
    networks:
      internal-net:
        aliases:
          - eduskill.localhost
    restart: unless-stopped

  auth-backend:
    build:
      context: .
      dockerfile: auth-backend/Dockerfile
    image: auth-backend:latest
    environment:
      # 服务运行配置
      - HOST=0.0.0.0
      - PORT=3000
      # Zitadel 服务账号 PAT（从文件读取，Docker 中自动挂载 volume）
      - ZITADEL_SERVICE_PAT_FILE=/zitadel/bootstrap/login-client.pat
      # Zitadel 服务账号 PAT（本地开发时可直接设置，优先级高于文件）
      - ZITADEL_SERVICE_PAT=${ZITADEL_SERVICE_PAT:-''}
      # Zitadel OIDC 配置
      - ZITADEL_ISSUER=${ZITADEL_ISSUER}
      - ZITADEL_INTERNAL_ISSUER=${ZITADEL_INTERNAL_ISSUER:-${ZITADEL_ISSUER}}
      - ZITADEL_CLIENT_ID=${ZITADEL_CLIENT_ID}
      - ZITADEL_LOGIN_REDIRECT_URI=${ZITADEL_LOGIN_REDIRECT_URI:-http://auth-service:3000/auth/callback}
      - ZITADEL_PROJECT_ID=${ZITADEL_PROJECT_ID}
      # 指定组织 ID，登录/注册时限定到该组织（留空则使用默认组织）
      - ZITADEL_ORG_ID=${ZITADEL_ORG_ID:-}
      # 注册时自动分配的角色
      - ZITADEL_DEFAULT_ROLE_KEY=${ZITADEL_DEFAULT_ROLE_KEY:-}
      # 阿里云短信配置
      - ALIYUN_ACCESS_KEY_ID=${ALIYUN_ACCESS_KEY_ID:-}
      - ALIYUN_ACCESS_KEY_SECRET=${ALIYUN_ACCESS_KEY_SECRET:-}
      - ALIYUN_SMS_SIGN_NAME=${ALIYUN_SMS_SIGN_NAME:-}
      - ALIYUN_SMS_TEMPLATE_CODE=${ALIYUN_SMS_TEMPLATE_CODE:-}
      # 邀请码配置
      - INVITE_CODES=${INVITE_CODES:-}
      - INVITE_REQUIRED=${INVITE_REQUIRED:-false}
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
    networks:
      - internal-net
    restart: unless-stopped
  auth-frontend:
    build:
      context: .
      dockerfile: auth-frontend/Dockerfile
      args:
        - VITE_API_BASE=${VITE_API_BASE:-}
        - VITE_SANDBOX_WORKSPACE_URL_TEMPLATE=${VITE_SANDBOX_WORKSPACE_URL_TEMPLATE:-}
    image: auth-frontend:latest
    environment:
      - API_UPSTREAM=http://auth-backend:3000
    depends_on:
      - auth-backend
    networks:
      - internal-net
    restart: unless-stopped

volumes:
  zitadel-bootstrap:

networks:
  internal-net:
    driver: bridge
