services:

  zitadel:
    restart: always
    image: "ghcr.io/zitadel/zitadel:${ZITADEL_VERSION:-v4.14.0}"
    user: "0"
    command: 'start-from-init --config /zitadel-config.yaml --steps /zitadel-init-steps.yaml --masterkey MasterkeyNeedsToHave32Characters --tlsMode disabled'
    networks:
      - internal-net
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./example-zitadel-config.yaml:/zitadel-config.yaml:ro
      - ./example-zitadel-init-steps.yaml:/zitadel-init-steps.yaml:ro
      - zitadel-bootstrap:/zitadel/bootstrap

  zitadel-login:
    restart: unless-stopped
    image: "ghcr.io/zitadel/zitadel-login:${ZITADEL_VERSION:-latest}"
    user: "0"
    environment:
      - ZITADEL_API_URL=${ZITADEL_ISSUER:-http://auth.localhost}
      - NEXT_PUBLIC_BASE_PATH=/ui/v2/login
      - ZITADEL_SERVICE_USER_TOKEN_FILE=/zitadel/bootstrap/login-client.pat
    depends_on:
      - zitadel
      - kong
    networks:
      - internal-net
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro

  postgres:
    image: m.daocloud.io/docker.io/library/postgres:17
    environment:
      POSTGRES_DB: educlaw
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d educlaw"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal-net

  kong:
    image: m.daocloud.io/docker.io/library/kong:3.6
    environment:
      - KONG_DATABASE=off
      - KONG_PLUGINS=bundled,oidc-jwt-auth
      - KONG_DECLARATIVE_CONFIG=/tmp/kong.yml
      - KONG_PROXY_LISTEN=0.0.0.0:80, 0.0.0.0:8000
      - KONG_APP_HOST=${KONG_APP_HOST:-eduskill.localhost}
      - KONG_AUTH_HOST=${KONG_AUTH_HOST:-auth.localhost}
      - ZITADEL_ISSUER=${ZITADEL_ISSUER}
      - ZITADEL_CLIENT_ID=${ZITADEL_CLIENT_ID}
    command: >-
      sh -c 'awk
      "{gsub(/__KONG_APP_HOST__/,\"$$KONG_APP_HOST\");
      gsub(/__KONG_AUTH_HOST__/,\"$$KONG_AUTH_HOST\");
      gsub(/__ZITADEL_ISSUER__/,\"$$ZITADEL_ISSUER\");
      gsub(/__ZITADEL_CLIENT_ID__/,\"$$ZITADEL_CLIENT_ID\"); print}"
      /etc/kong/kong.yml > /tmp/kong.yml
      && exec /docker-entrypoint.sh kong docker-start'
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
      - ./kong/plugins/oidc-jwt-auth:/usr/local/share/lua/5.1/kong/plugins/oidc-jwt-auth:ro
    ports:
      - "${KONG_PROXY_PORT:-80}:80"
      - "${KONG_ADMIN_PORT:-8001}:8001"  # Kong Admin API，仅用于调试，生产环境可移除
    networks:
      internal-net:
        aliases:
          - eduskill.localhost
          - auth.localhost
    restart: unless-stopped

  auth-backend:
    build:
      context: .
      dockerfile: auth-backend/Dockerfile
    image: auth-backend:latest
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - ZITADEL_SERVICE_PAT_FILE=/zitadel/bootstrap/login-client.pat
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
    networks:
      - internal-net
    depends_on:
      zitadel:
        condition: service_started
    restart: unless-stopped

volumes:
  zitadel-bootstrap:

